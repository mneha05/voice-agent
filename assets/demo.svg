<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e1a"/><stop offset="1" stop-color="#0a0d16"/>
    </linearGradient>
    <linearGradient id="listen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fe9d2"/><stop offset="1" stop-color="#31d0aa"/>
    </linearGradient>
    <linearGradient id="speak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9c2ff"/><stop offset="1" stop-color="#7aa2ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#7aa2ff" stop-opacity=".5"/><stop offset="1" stop-color="#7aa2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="860" height="440" rx="20" fill="url(#bg)"/>
  <rect x="1" y="1" width="858" height="438" rx="19" fill="none" stroke="#ffffff" stroke-opacity=".08"/>

  <!-- header -->
  <text x="34" y="46" fill="#e8ecf6" font-size="20" font-weight="700">🎙️ voice-agent</text>
  <text x="34" y="70" fill="#8891ab" font-size="13">streaming STT → LLM → streaming TTS · full-duplex · barge-in</text>

  <!-- state pill (cycles) -->
  <g transform="translate(686,34)">
    <rect width="140" height="30" rx="15" fill="#ffffff" fill-opacity=".05" stroke="#ffffff" stroke-opacity=".1"/>
    <circle cx="20" cy="15" r="5" fill="#31d0aa">
      <animate attributeName="fill" values="#31d0aa;#31d0aa;#f5c451;#7aa2ff;#7aa2ff;#31d0aa"
        keyTimes="0;0.33;0.42;0.55;0.9;1" dur="9s" repeatCount="indefinite"/>
    </circle>
    <text x="38" y="20" fill="#c7cee0" font-size="13" font-weight="600">
      listening
      <animate attributeName="fill" values="#31d0aa;#31d0aa;#f5c451;#7aa2ff;#7aa2ff;#31d0aa"
        keyTimes="0;0.33;0.42;0.55;0.9;1" dur="9s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- central orb + waveform -->
  <g transform="translate(430,210)">
    <circle r="118" fill="url(#glow)">
      <animate attributeName="r" values="96;120;96" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- animated waveform bars -->
  <g transform="translate(430,210)">
    <!-- each bar: x spaced, animated height -->
    <g fill="url(#listen)">
      <rect x="-138" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;46;20;12" dur="1.1s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-23;-10;-6" dur="1.1s" repeatCount="indefinite"/></rect>
      <rect x="-118" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;70;24;12" dur="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-35;-12;-6" dur="0.9s" repeatCount="indefinite"/></rect>
      <rect x="-98" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;40;60;12" dur="1.3s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-20;-30;-6" dur="1.3s" repeatCount="indefinite"/></rect>
      <rect x="-78" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;90;30;12" dur="1s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-45;-15;-6" dur="1s" repeatCount="indefinite"/></rect>
      <rect x="-58" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;56;80;12" dur="1.2s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-28;-40;-6" dur="1.2s" repeatCount="indefinite"/></rect>
      <rect x="-38" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;100;40;12" dur="0.85s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-50;-20;-6" dur="0.85s" repeatCount="indefinite"/></rect>
      <rect x="-18" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;74;110;12" dur="1.05s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-37;-55;-6" dur="1.05s" repeatCount="indefinite"/></rect>
      <rect x="2"  y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;110;50;12" dur="0.95s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-55;-25;-6" dur="0.95s" repeatCount="indefinite"/></rect>
      <rect x="22" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;60;96;12" dur="1.15s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-30;-48;-6" dur="1.15s" repeatCount="indefinite"/></rect>
      <rect x="42" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;84;36;12" dur="1s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-42;-18;-6" dur="1s" repeatCount="indefinite"/></rect>
      <rect x="62" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;50;70;12" dur="1.25s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-25;-35;-6" dur="1.25s" repeatCount="indefinite"/></rect>
      <rect x="82" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;40;18;12" dur="1.1s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-20;-9;-6" dur="1.1s" repeatCount="indefinite"/></rect>
      <rect x="102" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;30;14;12" dur="1.2s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-15;-7;-6" dur="1.2s" repeatCount="indefinite"/></rect>
    </g>
  </g>

  <!-- user bubble -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.15;0.22;0.85;0.92;1" dur="9s" repeatCount="indefinite"/>
    <rect x="470" y="360" width="356" height="46" rx="14" fill="#1b2440" stroke="#ffffff" stroke-opacity=".08"/>
    <text x="490" y="388" fill="#dfe5f4" font-size="15">“What's the weather like in Tokyo?”</text>
  </g>

  <!-- agent bubble -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.5;0.56;0.62;0.92;1" dur="9s" repeatCount="indefinite"/>
    <rect x="34" y="360" width="404" height="46" rx="14" fill="#ffffff" fill-opacity=".05" stroke="#ffffff" stroke-opacity=".08"/>
    <text x="54" y="388" fill="#c7cee0" font-size="15">“It's clear and about 22 degrees in Tokyo.”</text>
  </g>

  <!-- latency headline -->
  <g transform="translate(34,120)">
    <text x="0" y="0" fill="#8891ab" font-size="12" letter-spacing="1.5">P95 · MOUTH → RESPONSE</text>
    <text x="0" y="34" fill="#a9c2ff" font-size="34" font-weight="800">742 ms</text>
  </g>
</svg>
