<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="'Segoe UI',system-ui,sans-serif">
  <!--
    Animated schematic of the voice-agent. A ~16s loop showing two full
    conversational turns, a live barge-in, streaming captions, an updating
    latency panel, and a rotating feature ticker. Pure SMIL — plays on GitHub.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e1a"/><stop offset="1" stop-color="#090c15"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#7aa2ff" stop-opacity=".45"/><stop offset="1" stop-color="#7aa2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="860" height="460" rx="20" fill="url(#bg)"/>
  <rect x="1" y="1" width="858" height="458" rx="19" fill="none" stroke="#ffffff" stroke-opacity=".08"/>

  <!-- ── header ─────────────────────────────────────────────────────────── -->
  <text x="34" y="46" fill="#e8ecf6" font-size="20" font-weight="700">🎙️ voice-agent</text>
  <text x="34" y="70" fill="#8891ab" font-size="13">streaming STT → LLM → streaming TTS · full-duplex · barge-in</text>

  <!-- state pill (top right) -->
  <g transform="translate(686,34)">
    <rect width="140" height="30" rx="15" fill="#ffffff" fill-opacity=".05" stroke="#ffffff" stroke-opacity=".1"/>
    <circle cx="20" cy="15" r="5">
      <animate attributeName="fill" calcMode="discrete"
        keyTimes="0;0.281;0.338;0.519;0.6;0.7625;0.8125;0.9625;1"
        values="#31d0aa;#f5c451;#7aa2ff;#31d0aa;#31d0aa;#f5c451;#7aa2ff;#31d0aa;#31d0aa"
        dur="16s" repeatCount="indefinite"/>
    </circle>
    <g font-size="13" font-weight="600" transform="translate(38,20)">
      <text fill="#31d0aa">listening<animate attributeName="opacity" calcMode="discrete"
        keyTimes="0;0.281;0.338;0.519;0.6;0.7625;0.8125;0.9625;1" values="1;0;0;1;1;0;0;1;1" dur="16s" repeatCount="indefinite"/></text>
      <text fill="#f5c451">thinking<animate attributeName="opacity" calcMode="discrete"
        keyTimes="0;0.281;0.338;0.519;0.6;0.7625;0.8125;0.9625;1" values="0;1;0;0;0;1;0;0;0" dur="16s" repeatCount="indefinite"/></text>
      <text fill="#7aa2ff">speaking<animate attributeName="opacity" calcMode="discrete"
        keyTimes="0;0.281;0.338;0.519;0.6;0.7625;0.8125;0.9625;1" values="0;0;1;0;0;0;1;0;0" dur="16s" repeatCount="indefinite"/></text>
    </g>
  </g>

  <!-- ── latency panel (left) ───────────────────────────────────────────── -->
  <g transform="translate(34,96)">
    <rect width="214" height="150" rx="14" fill="#ffffff" fill-opacity=".04" stroke="#7aa2ff" stroke-opacity=".28"/>
    <text x="18" y="30" fill="#8891ab" font-size="11" letter-spacing="1.4">P95 · MOUTH → RESPONSE</text>
    <g transform="translate(18,74)" font-size="36" font-weight="800" fill="#a9c2ff">
      <text>742 ms<animate attributeName="opacity" calcMode="discrete" keyTimes="0;0.812;1" values="1;0;0" dur="16s" repeatCount="indefinite"/></text>
      <text>731 ms<animate attributeName="opacity" calcMode="discrete" keyTimes="0;0.812;1" values="0;1;1" dur="16s" repeatCount="indefinite"/></text>
    </g>
    <line x1="18" y1="92" x2="196" y2="92" stroke="#ffffff" stroke-opacity=".08"/>
    <g transform="translate(18,118)" font-size="12" fill="#8891ab">
      <text>last</text>
      <g transform="translate(0,20)" font-size="16" font-weight="700" fill="#e8ecf6">
        <text>712<animate attributeName="opacity" calcMode="discrete" keyTimes="0;0.812;1" values="1;0;0" dur="16s" repeatCount="indefinite"/></text>
        <text>698<animate attributeName="opacity" calcMode="discrete" keyTimes="0;0.812;1" values="0;1;1" dur="16s" repeatCount="indefinite"/></text>
      </g>
      <text x="70" y="0">p50</text>
      <text x="70" y="20" font-size="16" font-weight="700" fill="#e8ecf6">705</text>
      <text x="140" y="0">turns</text>
      <g transform="translate(140,20)" font-size="16" font-weight="700" fill="#31d0aa">
        <text>1<animate attributeName="opacity" calcMode="discrete" keyTimes="0;0.6;1" values="1;0;0" dur="16s" repeatCount="indefinite"/></text>
        <text>2<animate attributeName="opacity" calcMode="discrete" keyTimes="0;0.6;1" values="0;1;1" dur="16s" repeatCount="indefinite"/></text>
      </g>
    </g>
  </g>

  <!-- ── orb + waveform (center-right) ──────────────────────────────────── -->
  <g transform="translate(560,178)">
    <circle r="112" fill="url(#glow)"><animate attributeName="r" values="92;116;92" dur="4s" repeatCount="indefinite"/></circle>
    <g>
      <!-- bar colour follows the conversation state -->
      <animate attributeName="fill" calcMode="discrete"
        keyTimes="0;0.281;0.338;0.519;0.6;0.7625;0.8125;0.9625;1"
        values="#31d0aa;#f5c451;#7aa2ff;#31d0aa;#31d0aa;#f5c451;#7aa2ff;#31d0aa;#31d0aa"
        dur="16s" repeatCount="indefinite"/>
      <rect x="-132" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;46;20;12" dur="1.1s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-23;-10;-6" dur="1.1s" repeatCount="indefinite"/></rect>
      <rect x="-112" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;70;24;12" dur="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-35;-12;-6" dur="0.9s" repeatCount="indefinite"/></rect>
      <rect x="-92" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;40;60;12" dur="1.3s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-20;-30;-6" dur="1.3s" repeatCount="indefinite"/></rect>
      <rect x="-72" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;90;30;12" dur="1s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-45;-15;-6" dur="1s" repeatCount="indefinite"/></rect>
      <rect x="-52" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;56;80;12" dur="1.2s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-28;-40;-6" dur="1.2s" repeatCount="indefinite"/></rect>
      <rect x="-32" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;100;40;12" dur="0.85s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-50;-20;-6" dur="0.85s" repeatCount="indefinite"/></rect>
      <rect x="-12" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;74;110;12" dur="1.05s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-37;-55;-6" dur="1.05s" repeatCount="indefinite"/></rect>
      <rect x="8"  y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;110;50;12" dur="0.95s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-55;-25;-6" dur="0.95s" repeatCount="indefinite"/></rect>
      <rect x="28" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;60;96;12" dur="1.15s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-30;-48;-6" dur="1.15s" repeatCount="indefinite"/></rect>
      <rect x="48" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;84;36;12" dur="1s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-42;-18;-6" dur="1s" repeatCount="indefinite"/></rect>
      <rect x="68" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;50;70;12" dur="1.25s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-25;-35;-6" dur="1.25s" repeatCount="indefinite"/></rect>
      <rect x="88" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;40;18;12" dur="1.1s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-20;-9;-6" dur="1.1s" repeatCount="indefinite"/></rect>
      <rect x="108" y="-6" width="6" height="12" rx="3"><animate attributeName="height" values="12;30;14;12" dur="1.2s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-15;-7;-6" dur="1.2s" repeatCount="indefinite"/></rect>
    </g>
  </g>

  <!-- ── barge-in flash badge ───────────────────────────────────────────── -->
  <g transform="translate(388,150)" opacity="0">
    <animate attributeName="opacity" calcMode="spline" keyTimes="0;0.5;0.56;0.6;1"
      values="0;0;1;0;0" keySplines="0 0 1 1;.2 0 .3 1;.7 0 1 1;0 0 1 1" dur="16s" repeatCount="indefinite"/>
    <rect width="200" height="40" rx="20" fill="#ff5470" fill-opacity=".16" stroke="#ff5470" stroke-opacity=".7"/>
    <text x="100" y="25" text-anchor="middle" fill="#ff8f9c" font-size="14" font-weight="700">✋ barge-in — interrupted</text>
  </g>

  <!-- ── caption bubbles ────────────────────────────────────────────────── -->
  <!-- user (right aligned) -->
  <g>
    <g opacity="0"><animate attributeName="opacity" calcMode="discrete" keyTimes="0;0.06;0.55;1" values="0;1;0;0" dur="16s" repeatCount="indefinite"/>
      <rect x="446" y="292" width="380" height="44" rx="14" fill="#1b2440" stroke="#ffffff" stroke-opacity=".08"/>
      <text x="466" y="319" fill="#dfe5f4" font-size="15">🧑 “What's the weather in Tokyo?”</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" calcMode="discrete" keyTimes="0;0.6;0.9;1" values="0;1;0;0" dur="16s" repeatCount="indefinite"/>
      <rect x="446" y="292" width="380" height="44" rx="14" fill="#1b2440" stroke="#ffffff" stroke-opacity=".08"/>
      <text x="466" y="319" fill="#dfe5f4" font-size="15">🧑 “Actually — what about Kyoto?”</text>
    </g>
  </g>
  <!-- agent (left aligned) -->
  <g>
    <g opacity="0"><animate attributeName="opacity" calcMode="discrete" keyTimes="0;0.338;0.519;1" values="0;1;0;0" dur="16s" repeatCount="indefinite"/>
      <rect x="34" y="344" width="430" height="44" rx="14" fill="#ffffff" fill-opacity=".05" stroke="#ffffff" stroke-opacity=".08"/>
      <text x="54" y="371" fill="#c7cee0" font-size="15">🤖 “It's clear and about 22 degrees in Tokyo.”</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" calcMode="discrete" keyTimes="0;0.8125;0.9625;1" values="0;1;0;0" dur="16s" repeatCount="indefinite"/>
      <rect x="34" y="344" width="430" height="44" rx="14" fill="#ffffff" fill-opacity=".05" stroke="#ffffff" stroke-opacity=".08"/>
      <text x="54" y="371" fill="#c7cee0" font-size="15">🤖 “Kyoto's a bit cooler — around 19 degrees.”</text>
    </g>
  </g>

  <!-- ── feature ticker (bottom) ────────────────────────────────────────── -->
  <g transform="translate(34,410)" font-size="12" font-weight="600">
    <g transform="translate(0,0)">
      <rect width="128" height="30" rx="15" fill="#7aa2ff" fill-opacity=".08" stroke="#7aa2ff" stroke-opacity=".25">
        <animate attributeName="fill-opacity" values=".08;.28;.08" keyTimes="0;.5;1" dur="4s" begin="0s" repeatCount="indefinite"/></rect>
      <text x="64" y="20" text-anchor="middle" fill="#a9c2ff">⚡ sub-second</text>
    </g>
    <g transform="translate(140,0)">
      <rect width="118" height="30" rx="15" fill="#31d0aa" fill-opacity=".08" stroke="#31d0aa" stroke-opacity=".25">
        <animate attributeName="fill-opacity" values=".08;.28;.08" keyTimes="0;.5;1" dur="4s" begin="1s" repeatCount="indefinite"/></rect>
      <text x="59" y="20" text-anchor="middle" fill="#8fe9d2">✋ barge-in</text>
    </g>
    <g transform="translate(270,0)">
      <rect width="140" height="30" rx="15" fill="#f5c451" fill-opacity=".08" stroke="#f5c451" stroke-opacity=".25">
        <animate attributeName="fill-opacity" values=".08;.28;.08" keyTimes="0;.5;1" dur="4s" begin="2s" repeatCount="indefinite"/></rect>
      <text x="70" y="20" text-anchor="middle" fill="#f7d484">📝 live captions</text>
    </g>
    <g transform="translate(422,0)">
      <rect width="168" height="30" rx="15" fill="#c78bff" fill-opacity=".08" stroke="#c78bff" stroke-opacity=".25">
        <animate attributeName="fill-opacity" values=".08;.28;.08" keyTimes="0;.5;1" dur="4s" begin="3s" repeatCount="indefinite"/></rect>
      <text x="84" y="20" text-anchor="middle" fill="#d9b6ff">🧠 remembers context</text>
    </g>
  </g>
</svg>
